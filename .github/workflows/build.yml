name: Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: macOS
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build
        run: |
          xcodebuild \
            -project ScreenshotManager.xcodeproj \
            -scheme ScreenshotManager \
            -configuration Debug \
            -destination 'platform=macOS' \
            build
